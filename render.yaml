version: "1"
services:
  - type: web
    name: telegram-text-bot
    runtime: rust
    plan: free
    region: frankfurt
    buildCommand: cargo build --release
    startCommand: ./target/release/telegram_bot
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: PORT
        value: "8080"
    healthCheckPath: /
